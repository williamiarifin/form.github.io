<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h2>User Registration</h2>
            <p>Please fill out the form below to complete your profile.</p>
        </header>

        <form id="registrationForm">
            <fieldset>
                <legend>Personal Information</legend>
                
                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="dob">Date of Birth <span class="required">*</span></label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group half-width">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" placeholder="Auto-calculated" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
            </fieldset>

            <fieldset>
                <legend>Address Details</legend>

                <div class="form-group">
                    <label for="street">Street Address <span class="required">*</span></label>
                    <input type="text" id="street" name="street" placeholder="123 Main St" required>
                </div>

                <div class="form-row">
                    <div class="form-group half-width">
                        <label for="apartment">Apt, Suite, Unit</label>
                        <input type="text" id="apartment" name="apartment" placeholder="Apt 4B">
                    </div>
                    <div class="form-group half-width">
                        <label for="postalCode">Postal / Zip Code <span class="required">*</span></label>
                        <input type="text" id="postalCode" name="postalCode" placeholder="10001" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="country">Country <span class="required">*</span></label>
                    <select id="country" name="country" required>
                        <option value="" disabled selected>Select your country</option>
                        <option value="US">United States</option>
                        <option value="CA">Canada</option>
                        <option value="UK">United Kingdom</option>
                        <option value="AU">Australia</option>
                        <option value="ID">Indonesia</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </fieldset>

            <button type="submit" id="submitBtn">Submit Registration</button>
        </form>

        <div id="successMessage" class="hidden">
            <h3>Registration Successful!</h3>
            <p>Thank you for submitting your details.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
